name: Update Talon SDK Key

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd extractor
          npm install @babel/parser @babel/traverse @babel/generator @babel/types

      - name: Fetch talon_sdk.js
        run: |
          curl -fsSL -o xal.js "https://talon-website-prod.ecosec.on.epicgames.com/talon_sdk.js"
          echo "Downloaded xal.js ($(wc -c < xal.js) bytes)"

      - name: Run deobfuscator
        run: node extractor/deob.js

      - name: Update README
        run: |
          KEY=$(jq -r '.key // empty' config.json)
          NONCE=$(jq -r '.nonce // empty' config.json)
          NOW=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          if [ -z "$KEY" ]; then
            echo "No key extracted, skipping update"
            exit 0
          fi

          sed -i "s|> \*\*Key:\*\* \`.*\`|> **Key:** \`$KEY\`|" README.md
          sed -i "s|> \*\*Nonce:\*\* \`.*\`|> **Nonce:** \`$NONCE\`|" README.md
          sed -i "s|> \*\*Last updated:\*\* \`.*\`|> **Last updated:** \`$NOW\`|" README.md

          echo "Updated key=$KEY nonce=$NONCE at $NOW"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json deobfuscated.js xal.js README.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "update talon key $(date -u '+%Y-%m-%d %H:%M')"
          git push
